<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Dashboard — LiveQ&A</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="host-body">

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>Loading session&hellip;</p>
  </div>

  <!-- Top bar -->
  <header class="host-header">
    <div class="host-header-left">
      <a href="index.html" class="logo logo-sm">
        <svg width="28" height="28" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="10" fill="#6C5CE7"/><path d="M10 13h16M10 18h12M10 23h8" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><circle cx="27" cy="23" r="3" fill="#00E676"/></svg>
        <span>LiveQ&A</span>
      </a>
      <span class="separator">|</span>
      <span class="host-badge">HOST</span>
    </div>
    <div class="host-header-right">
      <button class="btn-icon" id="darkModeToggle" title="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="host-layout">
    <!-- Sidebar -->
    <aside class="host-sidebar">
      <div class="sidebar-section">
        <h2 id="sessionTitle" class="session-title-display">Loading…</h2>
        <div class="session-status" id="sessionStatus">
          <span class="status-dot active"></span> <span id="statusText">Active</span>
        </div>
      </div>

      <!-- QR Code -->
      <div class="sidebar-section qr-section">
        <h3>Share with audience</h3>
        <div id="qrCode" class="qr-placeholder"></div>
        <div class="join-link-box">
          <input type="text" id="joinLink" readonly />
          <button class="btn-icon btn-copy" id="copyLink" title="Copy link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
        <p class="session-code-label">Session Code</p>
        <p class="session-code" id="sessionCode">—</p>
      </div>

      <!-- Stats -->
      <div class="sidebar-section stats-section">
        <div class="stat-card">
          <span class="stat-number" id="questionCount">0</span>
          <span class="stat-label">Questions</span>
        </div>
        <div class="stat-card">
          <span class="stat-number" id="participantCount">0</span>
          <span class="stat-label">Participants</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="sidebar-section controls-section">
        <label class="toggle-row">
          <span>Accepting Questions</span>
          <input type="checkbox" id="toggleAccepting" checked />
          <span class="toggle-slider"></span>
        </label>
        <button class="btn btn-outline btn-full" id="exportCSV">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
        <button class="btn btn-danger btn-full" id="resetSession">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Reset Session
        </button>
        <button class="btn btn-outline btn-full" id="endSession">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
          End Session
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="host-main">
      <!-- Spotlight -->
      <section class="spotlight-section" id="spotlightSection" style="display:none;">
        <div class="spotlight-card">
          <div class="spotlight-label">
            <span class="pulse-dot"></span> Currently Answering
          </div>
          <p class="spotlight-text" id="spotlightText"></p>
          <p class="spotlight-author" id="spotlightAuthor"></p>
        </div>
      </section>

      <!-- Toolbar -->
      <div class="host-toolbar">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search questions…" />
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="open">Open</button>
          <button class="filter-tab" data-filter="answered">Answered</button>
          <button class="filter-tab" data-filter="pinned">Pinned</button>
        </div>
        <select id="sortSelect" class="sort-select">
          <option value="top">Top Voted</option>
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
        </select>
      </div>

      <!-- Question list -->
      <div id="questionList" class="question-list">
        <!-- Populated by JS -->
      </div>

      <!-- Empty state -->
      <div id="emptyState" class="empty-state" style="display:none;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.4"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <p>No questions yet.</p>
        <p class="empty-sub">Share the QR code with your audience to get started.</p>
      </div>
    </main>
  </div>

  <!-- Answer modal -->
  <div class="modal-overlay" id="answerModal" style="display:none;">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Answer Question</h3>
        <button class="btn-icon modal-close" id="closeAnswerModal">&times;</button>
      </div>
      <p class="modal-question-text" id="modalQuestionText"></p>
      <textarea id="answerInput" placeholder="Type your answer…" rows="4" maxlength="1000"></textarea>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelAnswer">Cancel</button>
        <button class="btn btn-primary" id="submitAnswer">Save Answer</button>
      </div>
    </div>
  </div>

  <!-- Confirm modal -->
  <div class="modal-overlay" id="confirmModal" style="display:none;">
    <div class="modal-card modal-sm">
      <h3 id="confirmTitle">Are you sure?</h3>
      <p id="confirmMessage"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
        <button class="btn btn-danger" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <!-- QR code library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js?v=3"></script>
  <script src="js/utils.js?v=3"></script>
  <script src="js/host.js?v=3"></script>
</body>
</html>
